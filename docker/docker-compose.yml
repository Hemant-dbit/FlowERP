version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment: 
      POSTGRES_DB: flowerp
      POSTGRES_USER: flowerp
      POSTGRES_PASSWORD: flowerp_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
